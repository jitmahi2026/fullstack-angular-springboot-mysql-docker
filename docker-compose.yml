services:
  mysql:
    image: mysql:8.4
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pgdb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pgdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    depends_on:
      - mysql
    ports:
      - "8081:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "4300:80"

volumes:
  mysql-data: